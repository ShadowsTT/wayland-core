name: Upstream sync

# Daily PR bringing new commits from the original engine repo
# (FerroxLabs/wayland-core) into this fork's main. It NEVER force-pushes main —
# this fork has diverged (its own commits), so a plain `gh repo sync --force`
# would destroy that work. Instead a throwaway branch (automated/upstream-sync)
# is fast-forwarded to upstream/main and a PR is opened, so any conflicts are
# resolved through normal review before merge (Option B: human-gated merge).
#
# Idempotent: nothing new -> exits quietly; PR already open -> just refreshes it.
#
# For CI to run on the sync PR (and for sync-release.yml to tag on merge), add a
# repo secret GH_TOKEN (a PAT with repo + workflow scope) — used when present.

on:
  schedule:
    - cron: '0 7 * * *' # daily 07:00 UTC (GitHub cron can lag up to ~1h)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM: FerroxLabs/wayland-core
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  SYNC_BRANCH: automated/upstream-sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

      - name: Open or update sync PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          behind=$(git rev-list --count "origin/${TARGET_BRANCH}..upstream/${UPSTREAM_BRANCH}")
          if [ "$behind" -eq 0 ]; then
            echo "Fork is up to date with ${UPSTREAM}@${UPSTREAM_BRANCH}. Nothing to do."
            exit 0
          fi
          echo "${behind} new upstream commit(s) to sync."
          git push origin "upstream/${UPSTREAM_BRANCH}:refs/heads/${SYNC_BRANCH}" --force
          if [ -n "$(gh pr list --head "${SYNC_BRANCH}" --base "${TARGET_BRANCH}" --state open --json number --jq '.[].number')" ]; then
            echo "Sync PR already open — branch updated, PR will refresh automatically."
            exit 0
          fi
          gh pr create \
            --base "${TARGET_BRANCH}" \
            --head "${SYNC_BRANCH}" \
            --title "chore: sync from upstream ${UPSTREAM}" \
            --body "Automated daily sync: ${behind} new commit(s) from \`${UPSTREAM}@${UPSTREAM_BRANCH}\`. Review + resolve conflicts before merging. This fork has its own changes, so do **not** force-overwrite main."
